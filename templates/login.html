<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - AD Rodovia A</title>

    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/ios/180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/ios/32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/ios/16.png">

    <link rel="stylesheet" href="../static/portal.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            background: #0f172a;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-logo {
            width: 220px;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 0.8rem;
            position: relative;
            text-align: left;
        }

        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            color: #64748b;
            user-select: none;
        }

        .hint {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    
<div id="pwa-install-banner" class="install-banner hidden">
    <div class="install-content">
        <span class="material-icons">install_mobile</span>
        <div class="install-text">
            <strong>App AD Rodovia A</strong>
            <span>Instale para acesso rápido</span>
        </div>
    </div>
    <div class="install-actions">
        <button id="btn-pwa-install" class="btn-install-now">Instalar</button>
        <button onclick="dismissInstall()" class="btn-dismiss">&times;</button>
    </div>
</div>

<div class="login-box">
    <img src="../static/logo.png" alt="Logo AD Rodovia A" class="login-logo">

    <p style="color:#64748b; margin-bottom:20px; font-size:0.9rem;">
        Gestão Rodovia A
    </p>

    <div style="margin-top:20px; border-top:1px solid #e2e8f0; padding-top:15px;">
        <a href="/ebd" style="text-decoration:none; color:#3b82f6; font-size:0.85rem;">
            Acessar Site da EBD (Público)
        </a>
    </div>

    <form onsubmit="fazerLogin(event)">

        <div class="form-group">
            <label>CPF</label>
            <input
                type="text"
                id="login"
                class="form-input"
                placeholder="Somente números"
                inputmode="numeric"
                maxlength="11"
                required
            >
        </div>
        <div id="perfilDetectado" style="font-size:0.75rem; color:#475569; margin-bottom:8px;"></div>

        <div class="form-group">
            <label id="labelPass">Senha ou Nascimento</label>
            <input
                type="password"
                id="pass"
                class="form-input"
                placeholder="Senha ou DD/MM/AAAA"
                autocomplete="current-password"
                required
            >
            <span class="toggle-pass" id="togglePass">👁️</span>
            <div class="hint" id="passHint">
                Membros: data de nascimento
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-weight:bold;">
            Entrar no Sistema
        </button>
        
        <button type="button" id="btnBiometria" class="btn" style="width:100%; margin-top:10px; display:none;">
            🔐 Entrar com biometria
        </button>
    </form>
</div>

<script>
/* ===============================
   CONTROLE DE INTERFACE (DOM)
================================ */
document.addEventListener("DOMContentLoaded", () => {
    const loginInput = document.getElementById("login");
    const passInput = document.getElementById("pass");
    const toggleIcon = document.getElementById("togglePass");
    const hint = document.getElementById("passHint");
    const perfilLabel = document.getElementById("perfilDetectado");
    const btnBio = document.getElementById("btnBiometria");

    // 1. Foco Inicial
    loginInput.focus();

    // 2. Lógica do CPF
    loginInput.addEventListener("input", (e) => {
        let valor = e.target.value.replace(/\D/g, "");
        e.target.value = valor;

        if (valor.length >= 6) {
            perfilLabel.innerText = "Perfil detectado: Membro/Pastor";
        } else {
            perfilLabel.innerText = "";
        }

        if (valor.length === 11) {
            passInput.focus(); // Pulo automático
        }
    });

    // 3. Lógica da Senha / Data
    passInput.addEventListener("input", (e) => {
        let v = e.target.value;

        if (v.length > 0) {
            if (/^\d/.test(v)) {
                // É DATA: mostra texto, teclado numérico e esconde olho
                passInput.type = "text";
                passInput.inputMode = "numeric";
                toggleIcon.style.display = "none";
            } else {
                // É SENHA: oculta texto, teclado padrão e mostra olho
                passInput.type = "password";
                passInput.inputMode = "text";
                toggleIcon.style.display = "block";
            }
        } else {
            passInput.type = "password";
            toggleIcon.style.display = "block";
        }

        // Aplica Máscara se não houver letras
        if (!/[a-zA-Z]/.test(v)) {
            hint.innerText = "Membros: data de nascimento";
            v = v.replace(/\D/g, "");
            if (v.length >= 3 && v.length <= 4) v = v.replace(/^(\d{2})(\d+)/, "$1/$2");
            else if (v.length >= 5) v = v.replace(/^(\d{2})(\d{2})(\d+)/, "$1/$2/$3");
            if (v.length <= 10) e.target.value = v;
        } else {
            hint.innerText = "Senha alfanumérica detectada";
        }
    });

    // 4. Alternar olho manualmente (Administradores)
    toggleIcon.addEventListener("click", () => {
        passInput.type = passInput.type === "password" ? "text" : "password";
    });

    // 5. Exibição do botão de biometria
    const dadosLocais = localStorage.getItem("biometria_usuario");
    if (window.PublicKeyCredential && dadosLocais) {
        btnBio.style.display = "block";
    }

    // Listener do botão de biometria
    btnBio.addEventListener("click", loginBiometrico);
});

/* ===============================
   AUTENTICAÇÃO E BIOMETRIA
================================ */
function bufferToBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
    return window.btoa(binary);
}

function base64ToBuffer(base64) {
    const binary_string = window.atob(base64);
    const bytes = new Uint8Array(binary_string.length);
    for (let i = 0; i < binary_string.length; i++) bytes[i] = binary_string.charCodeAt(i);
    return bytes.buffer;
}

async function fazerLogin(e) {
    e.preventDefault();
    const btn = document.querySelector("button[type='submit']");
    const login = document.getElementById("login").value.trim();
    const password = document.getElementById("pass").value.trim();

    btn.disabled = true;
    btn.innerText = "Autenticando...";

    try {
        const res = await fetch("https://api-escala.onrender.com/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ login, password })
        });

        const data = await res.json();

        if (res.ok) {
            sessionStorage.setItem("usuario_sistema", JSON.stringify(data.user));
            sessionStorage.setItem("token_sistema", data.token);

            if (window.PublicKeyCredential) {
                const bioSalva = localStorage.getItem("biometria_usuario");
                const bioObj = bioSalva ? JSON.parse(bioSalva) : null;
                if (!bioObj || bioObj.login !== login) {
                    await registrarBiometria(login, data.user, data.token);
                }
            }
            irParaHome(data.user.PERFIL);
        } else {
            Swal.fire("Erro", data.detail || "Credenciais inválidas", "error");
            btn.disabled = false;
            btn.innerText = "Entrar no Sistema";
        }
    } catch (err) {
        Swal.fire("Erro", "Falha na conexão", "error");
        btn.disabled = false;
        btn.innerText = "Entrar no Sistema";
    }
}

async function loginBiometrico() {
    try {
        const dados = JSON.parse(localStorage.getItem("biometria_usuario"));
        const assertion = await navigator.credentials.get({
            publicKey: {
                challenge: window.crypto.getRandomValues(new Uint8Array(32)),
                timeout: 60000,
                rpId: window.location.hostname,
                allowCredentials: [{ id: base64ToBuffer(dados.credentialId), type: 'public-key' }]
            }
        });

        if (assertion) {
            sessionStorage.setItem("token_sistema", dados.token);
            sessionStorage.setItem("usuario_sistema", JSON.stringify({ NOME: dados.nome, PERFIL: dados.perfil, CPF: dados.login }));
            irParaHome(dados.perfil);
        }
    } catch (e) {
        Swal.fire("Erro", "Falha na leitura biométrica.", "error");
    }
}

async function registrarBiometria(login, user, token) {
    const result = await Swal.fire({
        title: 'Facilitar acesso?',
        text: "Deseja entrar com Digital/Face ID na próxima vez?",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#3b82f6',
        confirmButtonText: 'Sim, cadastrar'
    });

    if (!result.isConfirmed) return;

    try {
        const options = {
            challenge: window.crypto.getRandomValues(new Uint8Array(32)),
            rp: { name: "Gestão Rodovia A", id: window.location.hostname },
            user: { id: new TextEncoder().encode(login), name: login, displayName: user.NOME || login },
            pubKeyCredParams: [{alg: -7, type: "public-key"}, {alg: -257, type: "public-key"}],
            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
            timeout: 60000
        };

        const credential = await navigator.credentials.create({ publicKey: options });
        localStorage.setItem("biometria_usuario", JSON.stringify({
            login, perfil: user.PERFIL, token, nome: user.NOME, credentialId: bufferToBase64(credential.rawId)
        }));

        Swal.fire({ icon: 'success', title: 'Biometria Salva!', timer: 2000, showConfirmButton: false });
    } catch (err) { console.error(err); }
}

function irParaHome(perfil) {
    const p = perfil.toUpperCase();
    if (p === "ADMIN" || p === "SECRETARIA") window.location.href = "/secretaria";
    else if (p === "PASTOR") window.location.href = "/pastor";
    else window.location.href = "/membro";
}

/* ===============================
   PWA
================================ */
function dismissInstall() { document.getElementById('pwa-install-banner').classList.add('hidden'); }
</script>
</body>
</html>
