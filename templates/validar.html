<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Credencial - AD Rodovia A</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f1f5f9; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 90vh; 
        }
        .card { 
            background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 100%; max-width: 360px; padding: 40px 20px; text-align: center; 
            position: relative; overflow: hidden;
        }
        
        /* Faixa superior de decoração */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, #38bdf8, #0284c7);
        }

        .status-icon { font-size: 85px; margin-bottom: 10px; line-height: 1; }
        .valido { color: #22c55e; }
        .invalido { color: #ef4444; }

        .foto-membro { 
            width: 120px; height: 120px; border-radius: 45%; object-fit: cover; 
            border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            margin: 25px auto; background: #e2e8f0;
        }

        .nome { font-size: 1.3rem; font-weight: 700; color: #0f172a; margin-bottom: 5px; text-transform: uppercase;}
        .cargo { font-size: 0.95rem; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 20px;}
        
        .igreja-footer { 
            font-size: 0.85rem; color: #475569; margin-top: 30px; padding-top: 20px; 
            border-top: 1px dashed #cbd5e1; 
        }

        /* Animação de Carregamento */
        .loader { 
            border: 4px solid #f3f3f3; border-top: 4px solid #0ea5e9; border-radius: 50%; 
            width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 40px auto 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card" id="resultado">
        <div class="loader"></div>
        <h3 style="color:#64748b;">Consultando banco de dados...</h3>
    </div>

    <script>
        const API_BASE = 'https://api-escala.onrender.com/api';

        // Lógica de colagem da foto vinda do Python
        function montarFoto(obj) {
            let f = obj.FOTO || '';
            if (!f || f.length < 100) {
                f = ( (obj.FOTO_1||'') + (obj.FOTO_2||'') + (obj.FOTO_3||'') ).replace(/null/g, '').trim();
            }
            // Se a pessoa não tiver foto, mostra um ícone genérico
            return f && f.length > 20 ? f : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2394a3b8"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
        }

        function calcularIdade(aniversario) {
            var nascimento = aniversario.split("/");
            var dataNascimento = new Date(parseInt(nascimento[2], 10),
            parseInt(nascimento[1], 10) - 1,
            parseInt(nascimento[0], 10));
        
            var diferenca = Date.now() -  dataNascimento.getTime();
            var idade = new Date(diferenca);
        
            return Math.abs(idade.getUTCFullYear() - 1970);
        }

        async function validarDocumento() {
            const urlParams = new URLSearchParams(window.location.search);
            const hash = urlParams.get('id');
            const container = document.getElementById('resultado');

            if (!hash) {
                mostrarErro("QR Code inválido, adulterado ou link quebrado.");
                return;
            }

            try {
                // Chama nosso Guichê Público lá no Python!
                const res = await fetch(`${API_BASE}/public/validar/${hash}`);
                const data = await res.json();

                if (data.status === 'valido') {
                    const foto = montarFoto(data);
                    
                    // Sucesso Absoluto!
                    container.innerHTML = `
                        <div class="status-icon valido"><span class="material-icons" style="font-size: 50px;">verified</span></div>
                        <h2 class="valido" style="margin:0; letter-spacing: 1px;">MEMBRO ATIVO</h2>
                        
                        <img src="${foto}" class="foto-membro" alt="Foto Oficial">
                        
                        <div class="nome">${data.NOME}</div>
                        <div class="nascimento">${calcularIdade(data.NASCIMENTO)} anos</div>
                        <div class="batismo">Data de Batismo: ${data.BATISMO}</div>
                        <div class="cargo"><br>${data.CARGO}</div>
                        
                        <div class="igreja-footer">
                            <img src="static/logo.png" style="width: 90px; margin-bottom: 8px; filter: grayscale(100%); opacity: 0.7;" onerror="this.style.display='none'"><br>
                            <strong>ASSEMBLEIA DE DEUS</strong><br>
                            Congregação Rodovia A - Salvador/BA
                            Rua Rodovia A, n° 2597 - Boa Vista de São Caetano
                        </div>
                    `;
                } else {
                    mostrarErro(data.mensagem || "Documento não encontrado no sistema.");
                }
            } catch(e) {
                mostrarErro("Falha de conexão. Verifique sua internet e tente ler o QR Code novamente.");
            }
        }

        function mostrarErro(msg) {
            document.getElementById('resultado').innerHTML = `
                <div class="status-icon invalido"><span class="material-icons" style="font-size: 90px;">gpp_bad</span></div>
                <h2 class="invalido" style="margin:0 0 15px 0;">INVÁLIDO</h2>
                <p style="color:#475569; line-height: 1.5;">${msg}</p>
                <div class="igreja-footer" style="margin-top: 40px;">
                    <strong>Segurança de Dados</strong><br>AD Rodovia A
                </div>
            `;
        }

        // Executa automaticamente ao abrir o link
        validarDocumento();
    </script>
</body>
</html>
